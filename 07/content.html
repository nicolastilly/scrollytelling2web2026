<!DOCTYPE html>
<html lang="fr">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GSAP Scrollsmoother</title>

        <link rel="stylesheet" href="style.css">

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollToPlugin.min.js"></script>



    </head>

    <body>


        <section class="motion-path-section">
            <svg class="motion-path-svg" viewBox="0 0 393 3247" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path id="motion-path"
                    d="M268 47.501C157.333 178.168 -138.233 627.052 108.349 1239.5C424 2023.5 -201.669 1849.9 220.349 2219.5C604 2555.5 220.349 3055.5 76.349 3199.5"
                    stroke="black" stroke-width="95" stroke-linecap="round" />
                <circle id="motion-circle" r="42.5" fill="white" />
            </svg>
        </section>


        <script>
            (function () {
                var path = document.getElementById("motion-path");
                var circle = document.getElementById("motion-circle");
                if (!path || !circle) return;

                var pathLength = path.getTotalLength();

                /* Facteur > 1 = le cercle va plus vite que le scroll (ex: 1.5 = 50% plus rapide) */
                var pathProgressSpeed = 1.3;

                function setCirclePosition(progress) {
                    progress = Math.max(0, Math.min(1, progress));
                    var point = path.getPointAtLength(progress * pathLength);
                    circle.setAttribute("cx", point.x);
                    circle.setAttribute("cy", point.y);
                }

                gsap.registerPlugin(ScrollTrigger);

                ScrollTrigger.create({
                    trigger: ".motion-path-section",
                    start: "top top",
                    end: "bottom top",
                    scrub: true,
                    onUpdate: function (self) {
                        var circleProgress = Math.min(1, self.progress * pathProgressSpeed);
                        setCirclePosition(circleProgress);
                    }
                });

                setCirclePosition(0);
            })();
        </script>

</html>
